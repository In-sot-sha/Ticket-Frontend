<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f43f5e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- ── PWA / Install ──────────────────────────────── -->
    <!-- manifest.json is injected by vite-plugin-pwa at build time -->

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PartyStorm" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- ── Icons ─────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="canonical" href="https://partystorm.vercel.app" />

    <!-- ── SEO / Social ──────────────────────────────── -->
    <title>PartyStorm — Discover &amp; Book Event Tickets in Nigeria</title>
    <meta name="description" content="Discover, book and manage event tickets in Nigeria. From concerts to conferences, find the best events near you on PartyStorm. Your go-to platform for live entertainment." />
    <meta name="keywords" content="events, tickets, concerts, conferences, live entertainment, Nigeria, event booking, ticketing platform" />
    <meta name="author" content="PartyStorm" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_NG" />
    <meta property="og:url" content="https://partystorm.vercel.app" />
    <meta property="og:title" content="PartyStorm — Discover &amp; Book Event Tickets in Nigeria" />
    <meta property="og:description" content="Find and book tickets for the best live events near you. Concerts, conferences, festivals, and more." />
    <meta property="og:image" content="https://partystorm.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="PartyStorm - Discover and Book Event Tickets in Nigeria" />
    <meta property="og:site_name" content="PartyStorm" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@partystorm" />
    <meta name="twitter:url" content="https://partystorm.vercel.app" />
    <meta name="twitter:title" content="PartyStorm — Event Tickets" />
    <meta name="twitter:description" content="Discover and book tickets for live events in Nigeria." />
    <meta name="twitter:image" content="https://partystorm.vercel.app/og-image.png" />

    <!-- ── Structured Data (JSON-LD) ──────────────────── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PartyStorm",
        "url": "https://partystorm.vercel.app",
        "description": "Discover and book event tickets in Nigeria."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
