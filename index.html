<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / Install ──────────────────────────────── -->
    <!-- manifest.json is injected by vite-plugin-pwa at build time -->

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#f43f5e" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PartyStorm" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- ── Icons ─────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- ── SEO / Social ──────────────────────────────── -->
    <title>PartyStorm — Discover &amp; Book Event Tickets</title>
    <meta name="description" content="Discover, book and manage event tickets in Nigeria. From concerts to conferences, find events near you on PartyStorm." />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="PartyStorm — Discover &amp; Book Event Tickets" />
    <meta property="og:description" content="Find and book tickets for the best events near you." />
    <meta property="og:image"       content="/icons/icon.svg" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="PartyStorm" />
    <meta name="twitter:description" content="Find and book tickets for the best events near you." />
    <meta name="twitter:image"       content="/icons/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
